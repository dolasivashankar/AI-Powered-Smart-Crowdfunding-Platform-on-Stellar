name: StellarFlow AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  # ── 1. Lint & Type-check ──────────────────────────────────────────────────
  lint:
    name: ✅ Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript type-check
        working-directory: frontend
        run: npm run type-check

  # ── 2. Contract Tests ─────────────────────────────────────────────────────
  test-contracts:
    name: ✅ Contract Tests (Rust / Soroban)
    runs-on: ubuntu-latest
    needs: lint
    env:
      SOROBAN_SNAPSHOT_UPDATE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
          components: rustfmt,clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '.'

      - name: Run campaign contract tests
        run: cargo test --locked -p campaign -- --nocapture

      - name: Run escrow contract tests
        run: cargo test --locked -p escrow -- --nocapture

      - name: Run treasury contract tests
        run: cargo test --locked -p treasury -- --nocapture

      - name: Run milestone contract tests
        run: cargo test --locked -p milestone -- --nocapture

  # ── 3. Frontend Tests ─────────────────────────────────────────────────────
  test-frontend:
    name: ✅ Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    needs: test-contracts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Run Vitest unit tests
        working-directory: frontend
        run: npm run test
        env:
          VITE_STELLAR_NETWORK: TESTNET
          VITE_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          VITE_STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
          VITE_STELLAR_PASSPHRASE: 'Test SDF Network ; September 2015'
          VITE_CAMPAIGN_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
          VITE_ESCROW_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
          VITE_TREASURY_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
          VITE_MILESTONE_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
          VITE_ENABLE_AI_DESCRIPTIONS: 'false'
          VITE_ENABLE_EVENT_STREAMING: 'false'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ── 4. Build WASM Contracts ───────────────────────────────────────────────
  build-contracts:
    name: ✅ Build Soroban Contracts (WASM)
    runs-on: ubuntu-latest
    needs: test-contracts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown,wasm32v1-none
          components: rustfmt,clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '.'

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v27.0.0

      - name: Build campaign contract
        run: stellar contract build --package campaign --locked

      - name: Build escrow contract
        run: stellar contract build --package escrow --locked

      - name: Build treasury contract
        run: stellar contract build --package treasury --locked

      - name: Build milestone contract
        run: stellar contract build --package milestone --locked

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-wasm
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30

  # ── 5. Build Frontend ─────────────────────────────────────────────────────
  build-frontend:
    name: ✅ Build Frontend (Production)
    runs-on: ubuntu-latest
    needs: [test-frontend, build-contracts]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build production bundle
        working-directory: frontend
        run: npm run build
        env:
          VITE_STELLAR_NETWORK: TESTNET
          VITE_STELLAR_RPC_URL: ${{ secrets.VITE_STELLAR_RPC_URL || 'https://soroban-testnet.stellar.org' }}
          VITE_STELLAR_HORIZON_URL: ${{ secrets.VITE_STELLAR_HORIZON_URL || 'https://horizon-testnet.stellar.org' }}
          VITE_STELLAR_PASSPHRASE: 'Test SDF Network ; September 2015'
          VITE_CAMPAIGN_CONTRACT_ID: ${{ secrets.VITE_CAMPAIGN_CONTRACT_ID }}
          VITE_ESCROW_CONTRACT_ID: ${{ secrets.VITE_ESCROW_CONTRACT_ID }}
          VITE_TREASURY_CONTRACT_ID: ${{ secrets.VITE_TREASURY_CONTRACT_ID }}
          VITE_MILESTONE_CONTRACT_ID: ${{ secrets.VITE_MILESTONE_CONTRACT_ID }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_ENABLE_AI_DESCRIPTIONS: 'true'
          VITE_ENABLE_EVENT_STREAMING: 'true'
          VITE_EVENT_POLL_INTERVAL_MS: '3000'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── 6. E2E Tests (Playwright) ─────────────────────────────────────────────
  test-e2e:
    name: ✅ E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          VITE_STELLAR_NETWORK: TESTNET
          VITE_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          VITE_STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
          VITE_STELLAR_PASSPHRASE: 'Test SDF Network ; September 2015'
          VITE_CAMPAIGN_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
          VITE_ESCROW_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
          VITE_TREASURY_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
          VITE_MILESTONE_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
          VITE_ENABLE_AI_DESCRIPTIONS: 'false'
          VITE_ENABLE_EVENT_STREAMING: 'false'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── 7. Deploy to Vercel (main branch only) ────────────────────────────────
  deploy-vercel:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build-frontend, test-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check Vercel secrets are configured
        id: check_token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "⚠️  VERCEL_TOKEN secret is not set — skipping Vercel deployment."
            echo "   To enable deployment, add VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID"
            echo "   to your GitHub repository secrets (Settings → Secrets → Actions)."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        if: steps.check_token.outputs.skip == 'false'
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        if: steps.check_token.outputs.skip == 'false'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (production)
        id: deploy
        if: steps.check_token.outputs.skip == 'false'
        run: |
          DEPLOY_URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

